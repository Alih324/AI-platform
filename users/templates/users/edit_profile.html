{% extends "base.html" %}

{% block title %}Edit Profile | AI Site{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="page-header">
            <h1 class="fw-bold">Edit profile</h1>
            <p class="text-muted">Update your account information.</p>
        </div>
        <div class="card p-4 form-card mx-auto">
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-check-circle"></i> Save
                    </button>
                    <a class="btn btn-outline-secondary" href="{% url 'profile' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
