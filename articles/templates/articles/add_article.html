{% extends "base.html" %}

{% block title %}Add Article | AI Site{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="page-header">
            <h1 class="fw-bold">Add article</h1>
            <p class="text-muted">Share a new post with the site.</p>
        </div>
        <div class="card p-4 form-card mx-auto">
            <form method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex gap-2">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-plus-circle"></i> Publish
                    </button>
                    <a class="btn btn-outline-secondary" href="{% url 'articles_list' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
